<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Pet - O Aumigo da Vizinhança</title>
    <style>
        /* Reset básico para tirar margens chatas e definir a fonte */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        /* O fundo azul da página e centralização do chat */
        body { background-color: #85C1E9; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* Container principal do Chat (o celularzinho) */
        #chat-container { 
            width: 400px; 
            height: 550px; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 2px solid #E74C3C; 
            position: relative;
            z-index: 10;
        }

        /* Header: Onde fica o nome e o relógio */
        #chat-header { background: #E74C3C; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #F1C40F; }
        .brand { display: flex; align-items: center; gap: 10px; }
        
        /* Círculo da logo no topo */
        .logo-box { width: 35px; height: 35px; background: #2980B9; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #F1C40F; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        #clock { font-family: monospace; font-size: 13px; opacity: 0.9; font-weight: bold; }

        /* A "janela" onde as mensagens aparecem */
        #chat-window { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background-color: #f9f9f9; 
            background-image: radial-gradient(#E74C3C 0.5px, transparent 0.5px); 
            background-size: 10px 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        /* Estilo das bolhas de mensagem */
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 80%; word-wrap: break-word; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user { background: #2980B9; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #FFF3E0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #F1C40F; }

        /* Rodapé com campo de texto e botão */
        #input-area { display: flex; padding: 15px; background: #fff; border-top: 2px solid #2980B9; }
        #user-input { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 20px; outline: none; }
        #user-input:focus { border-color: #E74C3C; }
        #send-btn { background: #E74C3C; color: white; border: none; padding: 0 15px; margin-left: 8px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* Decoração: Imagem de fundo e o mascote pendurado */
        .fundo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .fundo img { width: 100%; height: 100%; object-fit: cover; }

        .aumigo { position: absolute; top: 0; left: 10vh; transform-origin: top center; animation: balanco 5s ease-in-out infinite; z-index: 5; }
        
        /* Animação para o cachorro ficar balançando como se estivesse numa teia */
        @keyframes balanco {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
    </style>
</head>
<body>

<div class="fundo"><img src="/media/Background.png" alt="Cidade"></div>
<div class="aumigo"><img src="/media/Aumigo.png" alt="Cão Aranha" width="350"></div>

<div id="chat-container">
    <div id="chat-header">
        <div class="brand">
            <div class="logo-box"><img src="/media/Media (1).jpg"></div>
            <span style="font-weight: bold;">Aumigo da Vizinhança</span>
        </div>
        <div id="clock">00:00</div>
    </div>

    <div id="chat-window">
        <div class="msg bot">Au au! 🐶 Sou o seu Aumigo da Vizinhança! Como posso usar meus superpoderes para ajudar o seu pet hoje? 🕸️</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Pergunte sobre vacina, banho..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script>
    // 1. Atualiza o relógio do topo a cada segundo
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 2. Nossa "FAQ" interna. Se o usuário digitar algo que combine aqui, o bot responde na hora.
    const brain = [
        { key: "bom dia", resp: "Bom dia, aumigo! Meu sentido canino diz que hoje vai ser um dia de muitos petiscos! 🐾" },
        { key: "vacina", resp: "As vacinas são o escudo do seu pet! Precisamos manter a V10 e a Antirrábica em dia. 💉🛡️" },
        { key: "banho", resp: "Hora da limpeza! Atendemos de segunda a sábado. Ele vai sair cheirosinho! 🛁" },
        { key: "contato", resp: "Pode latir para nós no (11) 4002-8922! 📱" },
        { key: "endereco", resp: "Nossa base fica na Rua dos Ossos, 101 - Centro. Venha nos visitar! 🗺️" }
    ];

    const windowChat = document.getElementById('chat-window');
    const inputField = document.getElementById('user-input');
    const button = document.getElementById('send-btn');

    // 3. Função principal de envio
    async function sendMessage() {
        const text = inputField.value.trim();
        if (text === "") return; // Não envia se estiver vazio

        // Mostra a mensagem do usuário na tela
        appendMsg(text, 'user');
        inputField.value = "";

        // Cria aquela mensagem de "pensando..."
        const loading = document.createElement('div');
        loading.className = 'msg bot';
        loading.innerText = "Usando sentido canino... 🐾";
        windowChat.appendChild(loading);
        windowChat.scrollTop = windowChat.scrollHeight;

        try {
            // Busca a resposta (Local ou API)
            const response = await findResponse(text);
            windowChat.removeChild(loading); // Remove o "pensando..."
            appendMsg(response, 'bot');     // Coloca a resposta real
        } catch (error) {
            windowChat.removeChild(loading);
            appendMsg("Minha teia falhou! Verifique a conexão (ou sua chave da API). 🕸️⚠️", 'bot');
        }
    }

    // 4. Lógica de decisão: Resposta pronta VS Inteligência Artificial
    async function findResponse(userInput) {
        // Limpa o texto: tudo minúsculo e remove acentos
        const cleanInput = userInput.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "");
        
        // Tenta achar uma palavra-chave no nosso "brain"
        const match = brain.find(item => cleanInput.includes(item.key));
        
        if (match) {
            // Pequeno delay para parecer que está digitando
            return new Promise(resolve => setTimeout(() => resolve(match.resp), 600));
        } else {
            // Se não souber a resposta, chama o Gemini
            return await chamarGemini(userInput);
        }
    }

    // 5. Integração com a API do Gemini
    async function chamarGemini(mensagemUsuario) {
        // --- INSIRA SUA CHAVE AQUI ---
        const MINHA_CHAVE = 'AIzaSyCeGNfZqtzHYgrPIgrbIO6OfjJ-GTZ8Jmw'; 

        if(!MINHA_CHAVE) return "Au! Preciso de uma chave de API para pensar melhor sobre isso... 🔑";

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE}`;
        
        // Aqui a gente "treina" o bot rapidamente dizendo quem ele é
        const promptPersonalidade = `Você é o "Aumigo da Vizinhança", um cão-herói veterinário. Responda de forma curta (até 3 frases), use emojis de pet/herói e seja muito amigável. Pergunta: ${mensagemUsuario}`;

        const corpoRequisicao = {
            contents: [{ parts: [{ text: promptPersonalidade }] }]
        };

        const resposta = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(corpoRequisicao)
        });

        const dados = await resposta.json();
        return dados.candidates[0].content.parts[0].text;
    }

    // 6. Função para colocar o texto no HTML
    function appendMsg(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerHTML = text.replace(/\n/g, '<br>'); // Troca quebras de linha por <br>
        windowChat.appendChild(div);
        windowChat.scrollTop = windowChat.scrollHeight; // Rola o chat para baixo
    }

    // Atalhos: Clicar no botão ou apertar Enter
    button.onclick = sendMessage;
    inputField.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
